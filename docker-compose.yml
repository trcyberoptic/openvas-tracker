services:
  db:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: openvas_tracker
      MARIADB_USER: ot
      MARIADB_PASSWORD: ot
    ports:
      - "3306:3306"
    volumes:
      - ./sql/docker-init.sql:/docker-entrypoint-initdb.d/00_init.sql
      - ./sql/migrations:/docker-entrypoint-initdb.d/migrations
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      OT_SERVER_HOST: "0.0.0.0"
      OT_SERVER_PORT: "8080"
      OT_DATABASE_DSN: "ot:ot@tcp(db:3306)/openvas_tracker?parseTime=true"
      OT_JWT_SECRET: "local-dev-secret-change-in-prod!!"
      OT_IMPORT_APIKEY: "local-dev-import-key-min-32-characters"
      OT_ADMIN_PASSWORD: "admin"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
